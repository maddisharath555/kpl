<html>

<body>

	<form class='form' id="form" method="post">
		<input type="text" name = "Village" Placeholder="Village"><br>
		<input type="text" name = "Name" Placeholder="Name"><br>
		<input type="text" name = "Profile" Placeholder="Profile"><br>
		<input type="submit">
		
	</form>
	
	<script>
		let url='https://script.google.com/macros/s/AKfycbzCerTqtIrASYZNYFqACC-muiIYvWbMx8Pr9FKA63Dh6FHdWWIxPztXQEpsMPS0cdcagw/exec';
		let form =document.querySelector('#form');
		form.addEventListener("submit",(e)=>{
			let d = new FormData(form);
			fetch(url,{
				method:"POST",
				body:d}
			).then((res)=>res.text())
			.then((finalRes)=>console.log(finalRes))
			e.preventDefault();
		})	
		
	</script>
		



</body>



</html>
